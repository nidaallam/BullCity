name: Daily Data Fetch

on:
  schedule:
    - cron: '0 12 * * *'   # Daily 7:00 AM ET (noon UTC)
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      # ── Fetch news from Durham RSS feeds ──────────────────────────
      - name: Fetch news
        run: python scripts/fetch_news.py

      # ── Update meetings, polling places, ward boundaries, legislators, budget
      - name: Update civic data
        run: python scripts/update_civic_data.py

      # ── Check resource links (runs daily, skips if no broken links)
      - name: Check resource links
        run: python scripts/check_resources.py

      # ── Update meta.json timestamp ────────────────────────────────
      - name: Update meta timestamp
        run: |
          python - <<'EOF'
          import json, datetime
          from pathlib import Path

          today = datetime.date.today().isoformat()
          meta_path = Path("data/meta.json")
          try:
              meta = json.loads(meta_path.read_text())
          except Exception:
              meta = {"lastUpdated": today, "sources": {}}

          meta["lastUpdated"] = today
          for key in meta.get("sources", {}):
              meta["sources"][key] = today

          meta_path.write_text(json.dumps(meta, indent=2))
          print(f"Updated meta.json → {today}")
          EOF

      # ── Commit all changed data files ─────────────────────────────
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ news.json meetings.json calendar.json budget-data.json
          git diff --staged --quiet || git commit -m "chore: daily data fetch $(date +%Y-%m-%d)"
          git push
